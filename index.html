<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Bel Sekolah MP3 Otomatis (API Version)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .clock-card { background: linear-gradient(135deg, #0d6efd, #0a58ca); color: white; border: none; }
    .digital-clock { font-size: 3.8rem; font-weight: bold; font-family: monospace; }
  </style>
</head>
<body class="p-4">
  <div class="container">
    
    <!-- HEADER JAM -->
    <div class="card clock-card text-center p-4 mb-4 shadow rounded-4">
      <h4 id="namaHariTanggal" class="mb-1 fw-normal">--</h4>
      <div class="digital-clock" id="jamDigital">00:00:00</div>
      <div class="mt-3">
        <button class="btn btn-warning btn-lg fw-bold px-4 py-2 shadow" id="btnAktifkan" onclick="aktifkanAudio()">
          🔔 KLIK DISINI SEKALI UNTUK MENGAKTIFKAN SUARA BEL MP3
        </button>
      </div>
    </div>

    <div class="row g-4">
      <!-- TABEL JADWAL -->
      <div class="col-md-8">
        <div class="card shadow-sm border-0 rounded-3">
          <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h6 class="mb-0 fw-bold">JADWAL BEL SEKOLAH</h6>
            
            <div class="d-flex align-items-center gap-2">
              <label class="small fw-bold text-white mb-0">Tampilkan Hari:</label>
              <select id="selectHariFilter" class="form-select form-select-sm fw-bold text-primary" style="width: auto;" onchange="tampilkanTabelJadwal()">
                <option value="HARI_INI">📅 Hari Ini (Otomatis)</option>
                <option value="senin">Senin (Upacara)</option>
                <option value="selasa">Selasa</option>
                <option value="rabu">Rabu</option>
                <option value="kamis">Kamis</option>
                <option value="jumat">Jumat</option>
                <option value="sabtu">Sabtu</option>
                <option value="SEMUA">📋 Semua Hari</option>
              </select>
              <button class="btn btn-sm btn-light text-primary fw-bold" onclick="muatJadwal()">🔄 Reload</button>
            </div>
          </div>
          <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0 text-center">
              <thead class="table-light">
                <tr>
                  <th>Hari</th>
                  <th>Jam</th>
                  <th>Keterangan</th>
                  <th>Status MP3</th>
                  <th>Aksi Manual</th>
                </tr>
              </thead>
              <tbody id="tabelJadwal">
                <tr><td colspan="5" class="text-muted py-4">Memuat data jadwal via API...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- PLAYER AUDIO MP3 -->
      <div class="col-md-4">
        <div class="card shadow-sm border-0 rounded-3">
          <div class="card-header bg-dark text-white fw-bold">PLAYER AUDIO MP3</div>
          <div class="card-body text-center py-4">
            <p id="nowPlayingText" class="text-secondary fw-semibold mb-3">Sistem Siap Memutar MP3</p>
            <audio id="audioPlayer" controls style="width: 100%;"></audio>
            <div class="mt-3">
              <span class="badge bg-success" id="indicatorOtomatis">● Mesin API Pengecek Jam Aktif</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- MODAL UPLOAD FILE -->
  <div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title fs-6 fw-bold" id="uploadModalTitle">Upload Audio MP3 Bel</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="uploadForm">
            <input type="hidden" id="targetRow">
            <div class="mb-3">
              <label class="form-label font-weight-bold">Pilih File MP3 dari Laptop:</label>
              <input type="file" class="form-control" id="audioFileInput" accept="audio/*" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btnSubmitUpload">📤 Upload via API</button>
          </form>
          <div id="uploadStatus" class="mt-3 text-center"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // URL API ENDPOINT
    const API_URL = "https://script.google.com/macros/s/AKfycbxSjOVZ-TKYooXU42JSG_gQlRPle_aVqAykUYyMJ-Gif4voB-GpCSdu7Mo6EkkkIpD7-g/exec";

    let daftarJadwal = [];
    let belSudahBunyi = {};
    const namaHari = ["minggu", "senin", "selasa", "rabu", "kamis", "jumat", "sabtu"];
    let uploadModalObj;

    document.addEventListener("DOMContentLoaded", function() {
      uploadModalObj = new bootstrap.Modal(document.getElementById('uploadModal'));
    });

    function aktifkanAudio() {
      const player = document.getElementById('audioPlayer');
      player.play().then(() => {
        player.pause();
        setSistemReady();
      }).catch(e => {
        setSistemReady();
      });
    }

    function setSistemReady() {
      const btn = document.getElementById('btnAktifkan');
      btn.className = "btn btn-success btn-lg fw-bold px-4 py-2 shadow disabled";
      btn.innerText = "✅ SUARA MP3 AKTIF & SIAP BERBUNYI OTOMATIS";
    }

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      
      const jamSekarang = `${h}:${m}`;
      document.getElementById('jamDigital').innerText = `${h}:${m}:${s}`;
      
      const hariSekarang = namaHari[now.getDay()];
      const tanggal = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('namaHariTanggal').innerText = `${hariSekarang.toUpperCase()}, ${tanggal}`;

      if (s === "00") {
        cekJadwalBel(jamSekarang, hariSekarang);
      }
    }

    // MEMUAT JADWAL DARI API
    function muatJadwal() {
      fetch(`${API_URL}?action=getJadwal`)
        .then(res => res.json())
        .then(data => {
          daftarJadwal = data;
          tampilkanTabelJadwal();
        })
        .catch(err => {
          console.error("Gagal muat API:", err);
        });
    }

    function tampilkanTabelJadwal() {
      const tbody = document.getElementById('tabelJadwal');
      tbody.innerHTML = '';
      
      const now = new Date();
      const hariIni = namaHari[now.getDay()];
      const filterPilihan = document.getElementById('selectHariFilter').value;

      let jadwalFiltered = [];

      if (filterPilihan === "HARI_INI") {
        jadwalFiltered = daftarJadwal.filter(j => j.hari === hariIni || j.hari === 'semua');
      } else if (filterPilihan === "SEMUA") {
        jadwalFiltered = daftarJadwal;
      } else {
        jadwalFiltered = daftarJadwal.filter(j => j.hari === filterPilihan || j.hari === 'semua');
      }

      if (jadwalFiltered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-muted py-4">Tidak ada jadwal bel untuk filter ini.</td></tr>';
        return;
      }

      jadwalFiltered.forEach((j) => {
        const hasAudio = j.audioId !== "";
        const statusBadge = hasAudio 
          ? '<span class="badge bg-success">MP3 Ready</span>' 
          : '<span class="badge bg-danger">MP3 Kosong</span>';

        tbody.innerHTML += `
          <tr>
            <td class="fw-bold text-uppercase text-secondary small">${j.hari}</td>
            <td class="fw-bold text-primary">${j.jam} WIB</td>
            <td class="fw-semibold">${j.keterangan}</td>
            <td>${statusBadge}</td>
            <td>
              <button class="btn btn-sm btn-outline-success fw-bold me-1" onclick="bukaModalUpload(${j.rowNum}, '${j.keterangan} (${j.hari.toUpperCase()})')">
                📁 Upload MP3
              </button>
              ${hasAudio ? `<button class="btn btn-sm btn-outline-primary fw-bold" onclick="putarMP3Server('${j.audioId}', '${j.keterangan}')">🔔 Test MP3</button>` : ''}
            </td>
          </tr>
        `;
      });
    }

    function bukaModalUpload(rowNum, keterangan) {
      document.getElementById('targetRow').value = rowNum;
      document.getElementById('uploadModalTitle').innerText = 'Upload Audio MP3: ' + keterangan;
      document.getElementById('uploadStatus').innerHTML = '';
      document.getElementById('uploadForm').reset();
      uploadModalObj.show();
    }

    // UPLOAD MP3 VIA API POST
    document.getElementById('uploadForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const targetRow = document.getElementById('targetRow').value;
      const fileInput = document.getElementById('audioFileInput');
      const file = fileInput.files[0];
      const btn = document.getElementById('btnSubmitUpload');
      const statusDiv = document.getElementById('uploadStatus');

      if (!file) return;

      btn.disabled = true;
      btn.innerText = "Mengunggah via API...";
      statusDiv.innerHTML = '<span class="text-primary">Mengirimkan file ke Server...</span>';

      const reader = new FileReader();
      reader.onload = function(evt) {
        const base64Data = evt.target.result;
        
        fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: "uploadAudio",
            targetRow: targetRow,
            fileData: base64Data,
            fileName: file.name
          })
        })
        .then(res => res.json())
        .then(res => {
          btn.disabled = false;
          btn.innerText = "📤 Upload via API";
          if (res.status === "SUCCESS") {
            statusDiv.innerHTML = '<span class="text-success">✅ Berhasil Diunggah!</span>';
            setTimeout(() => {
              uploadModalObj.hide();
              muatJadwal();
            }, 1000);
          } else {
            statusDiv.innerHTML = '<span class="text-danger">❌ Gagal: ' + res.message + '</span>';
          }
        })
        .catch(err => {
          btn.disabled = false;
          statusDiv.innerHTML = '<span class="text-danger">❌ Error API: ' + err.toString() + '</span>';
        });
      };

      reader.readAsDataURL(file);
    });

    function cekJadwalBel(jamSekarang, hariSekarang) {
      daftarJadwal.forEach(j => {
        const cocokHari = (j.hari === hariSekarang || j.hari === 'semua');
        const cocokJam = (j.jam === jamSekarang);
        const key = `${hariSekarang}_${jamSekarang}_${j.keterangan}`;

        if (cocokHari && cocokJam && !belSudahBunyi[key] && j.audioId !== "") {
          belSudahBunyi[key] = true;
          putarMP3Server(j.audioId, j.keterangan);
        }
      });
    }

    // AMBIL BYTE AUDIO MP3 VIA API GET
    function putarMP3Server(audioId, keterangan) {
      if (!audioId) return;

      const player = document.getElementById('audioPlayer');
      document.getElementById('nowPlayingText').innerText = `⏳ Memuat Audio MP3 via API: ${keterangan}...`;

      fetch(`${API_URL}?action=getAudio&audioId=${audioId}`)
        .then(res => res.json())
        .then(res => {
          if (res.status === "SUCCESS" && res.data) {
            document.getElementById('nowPlayingText').innerText = `▶️ Memutar MP3: ${keterangan}`;
            player.src = "data:audio/mp3;base64," + res.data;
            player.play();
          } else {
            document.getElementById('nowPlayingText').innerText = `❌ Gagal memuat audio!`;
          }
        })
        .catch(err => {
          document.getElementById('nowPlayingText').innerText = `❌ Error API Audio!`;
        });
    }

    setInterval(updateClock, 1000);
    setInterval(muatJadwal, 60000);
    muatJadwal();
  </script>
</body>
</html>
